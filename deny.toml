# cargo-deny configuration for Synap
# See https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
# RUSTSEC-2024-0436: paste crate is unmaintained (transitive dep via rmcp)
# RUSTSEC-2025-0119: number_prefix unmaintained (indicatif 0.17 → fixed in 0.18+)
# RUSTSEC-2025-0134: rustls-pemfile unmaintained (reqwest 0.11 → fixed in 0.12+)
# RUSTSEC-2025-0141: bincode 2.0 is unmaintained; no current alternative available
# RUSTSEC-2026-0007: bytes integer overflow in BytesMut::reserve — pre-existing,
#   no upstream fix available yet for the pinned version
# RUSTSEC-2026-0037: quinn-proto DoS — pre-existing transitive dep (via webrtc),
#   no upgrade path available without breaking changes
# RUSTSEC-2026-0049: rustls-webpki CRL matching logic — pre-existing transitive dep
ignore = [
    "RUSTSEC-2024-0436",
    "RUSTSEC-2025-0119",
    "RUSTSEC-2025-0134",
    "RUSTSEC-2025-0141",
    "RUSTSEC-2026-0007",
    "RUSTSEC-2026-0037",
    "RUSTSEC-2026-0049",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unlicense",
    "CC0-1.0",
]
confidence-threshold = 0.8

# Allow licenses used by common Rust dependencies
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# Skip duplicate version checks for these crates
skip = []

skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

