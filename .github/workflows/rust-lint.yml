name: Rust Linting

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # CI starts from a cold cache, so incremental compilation only adds
  # artifacts and slows the build. See docs/rust-target-hygiene.md.
  CARGO_INCREMENTAL: 0

jobs:
  rustfmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Check code formatting
        run: cargo +nightly fmt --all -- --check

  clippy:
    name: Clippy Lints
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: clippy

      # `--all-targets --all-features` is a superset of the narrower runs this
      # job used to make first (`--workspace`, then `--workspace
      # --all-targets`): anything they would catch, this catches. Keeping all
      # three compiled the workspace three times for one guarantee.
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  cargo-deny:
    name: Security & License Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Check security advisories
        run: cargo deny check advisories

      - name: Check licenses
        run: cargo deny check licenses
        continue-on-error: true

      - name: Check bans
        run: cargo deny check bans
        continue-on-error: true

  # A separate `cargo audit` job used to run here. It queried the same RustSec
  # advisory database `cargo deny check advisories` above already gates on, and
  # it carried `continue-on-error: true`, so it could never fail the build — a
  # second opinion that was never allowed to disagree. The gating check stays.

