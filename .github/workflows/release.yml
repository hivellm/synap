name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., v0.3.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel sibling matrix entries when one fails — we need
      # to be able to publish the macOS / Windows artifacts even if a
      # Linux runner has a transient issue.
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: synap-linux-x64

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: synap-linux-arm64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: synap-windows-x64

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: synap-macos-x64

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: synap-macos-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (ARM64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      # Use the Rust-aware cache action. Cargo.lock is gitignored in
      # this repo, so the prior raw `actions/cache@v4` on target/ keyed
      # by `hashFiles('**/Cargo.lock')` produced a constant key every
      # run and ended up restoring a poisoned mix of binaries from
      # previous tags. Swatinem/rust-cache hashes Cargo.toml manifests,
      # prunes the target dir of test/build-script artifacts, and
      # honours the matrix target.
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-release

      - name: Build synap-server
        run: cargo build --release --bin synap-server --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Build synap-cli
        run: cargo build --release --bin synap-cli --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Prepare artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/synap-server dist/
          cp target/${{ matrix.target }}/release/synap-cli dist/
          cp README.md dist/
          cp CHANGELOG.md dist/
          cp LICENSE dist/
          cp config.yml dist/config.example.yml
          cd dist
          tar czf ../${{ matrix.artifact_name }}.tar.gz *

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target\${{ matrix.target }}\release\synap-server.exe dist\
          Copy-Item target\${{ matrix.target }}\release\synap-cli.exe dist\
          Copy-Item README.md dist\
          Copy-Item CHANGELOG.md dist\
          Copy-Item LICENSE dist\
          Copy-Item config.yml dist\config.example.yml
          Compress-Archive -Path dist\* -DestinationPath ${{ matrix.artifact_name }}.zip

      - name: Upload artifacts (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.tar.gz

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip
