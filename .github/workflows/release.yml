name: Release

# Build and attach release binaries to the GitHub Release, following the
# Nexus / Vectorizer pipeline (taiki-e/upload-rust-binary-action):
#   - runs when a Release is PUBLISHED (not on tag push — creating the
#     GitHub Release is the publish action), or manually for an existing
#     tag via workflow_dispatch
#   - each target job is independent: one target failing does not cancel
#     the others
#   - aarch64-linux builds NATIVELY on ubuntu-24.04-arm (public-repo
#     runner) — no cross gcc, no vendored OpenSSL
#   - every archive ships with a .sha256 checksum asset

permissions:
  contents: write

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v1.0.0)"
        required: true
        type: string

# Resolve the release tag once so every job sees the same value:
#   - `release:published` → github.ref_name holds the tag
#   - `workflow_dispatch`  → the free-form `tag` input above
env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
  # CI starts cold — incremental compilation only adds artifacts and
  # slows the build.
  CARGO_INCREMENTAL: "0"

jobs:
  build-linux-x86_64-gnu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: x86_64-unknown-linux-gnu
      - name: Build and publish synap-server
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: synap-server
          target: x86_64-unknown-linux-gnu
          checksum: sha256
          ref: refs/tags/${{ env.RELEASE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish synap-cli
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: synap-cli
          target: x86_64-unknown-linux-gnu
          checksum: sha256
          ref: refs/tags/${{ env.RELEASE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}

  # Native arm64 runner (free for public repos) — no cross-compilation
  # toolchain and no vendored-openssl needed: the system libssl-dev is
  # the right architecture.
  build-linux-aarch64-gnu:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: aarch64-unknown-linux-gnu
      - name: Build and publish synap-server
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: synap-server
          target: aarch64-unknown-linux-gnu
          checksum: sha256
          ref: refs/tags/${{ env.RELEASE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish synap-cli
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: synap-cli
          target: aarch64-unknown-linux-gnu
          checksum: sha256
          ref: refs/tags/${{ env.RELEASE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}

  build-mac-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
          - target: aarch64-apple-darwin
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: ${{ matrix.target }}
      - name: Build and publish synap-server
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: synap-server
          target: ${{ matrix.target }}
          checksum: sha256
          ref: refs/tags/${{ env.RELEASE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish synap-cli
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: synap-cli
          target: ${{ matrix.target }}
          checksum: sha256
          ref: refs/tags/${{ env.RELEASE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}

  build-windows-binaries:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - name: Build and publish synap-server
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: synap-server
          target: x86_64-pc-windows-msvc
          checksum: sha256
          ref: refs/tags/${{ env.RELEASE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish synap-cli
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: synap-cli
          target: x86_64-pc-windows-msvc
          checksum: sha256
          ref: refs/tags/${{ env.RELEASE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
